<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tip Calculator</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#11998e,#38ef7d);
}

.container{
    width:420px;
    background:rgba(255,255,255,.15);
    backdrop-filter:blur(12px);
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
    color:white;
}

h1{
    text-align:center;
    margin-bottom:25px;
}

.input-group{
    margin-bottom:18px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:600;
}

input[type="number"]{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    font-size:16px;
}

.slider-value{
    text-align:center;
    font-size:20px;
    margin:10px 0;
    font-weight:bold;
}

input[type="range"]{
    width:100%;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:white;
    color:#11998e;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    transform:scale(1.03);
}

.results{
    margin-top:25px;
    display:none;
}

.card{
    background:rgba(255,255,255,.2);
    padding:15px;
    border-radius:12px;
    margin-bottom:12px;
    text-align:center;
}

.card h3{
    margin-bottom:8px;
}

.card p{
    font-size:24px;
    font-weight:bold;
}

@media(max-width:500px){
    .container{
        width:90%;
    }
}

</style>
</head>

<body>

<div class="container">

    <h1>💰 Tip Calculator</h1>

    <div class="input-group">
        <label>Bill Amount (₹)</label>
        <input type="number" id="bill" placeholder="Enter bill amount">
    </div>

    <div class="input-group">
        <label>Tip Percentage</label>

        <div class="slider-value">
            <span id="tipPercent">10</span>%
        </div>

        <input
            type="range"
            min="0"
            max="30"
            value="10"
            id="tipSlider"
            oninput="updateTipValue()">
    </div>

    <div class="input-group">
        <label>Number of People</label>
        <input type="number" id="people" placeholder="Enter number of people">
    </div>

    <button onclick="calculateTip()">
        Calculate
    </button>

    <div class="results" id="results">

        <div class="card">
            <h3>Tip Per Person</h3>
            <p id="tipPerPerson">₹0</p>
        </div>

        <div class="card">
            <h3>Total Per Person</h3>
            <p id="totalPerPerson">₹0</p>
        </div>

    </div>

</div>

<script>

function updateTipValue(){
    document.getElementById("tipPercent").innerHTML =
        document.getElementById("tipSlider").value;
}

function calculateTip(){

    let bill =
        parseFloat(document.getElementById("bill").value);

    let people =
        parseInt(document.getElementById("people").value);

    let tipPercent =
        parseFloat(document.getElementById("tipSlider").value);

    if(isNaN(bill) || bill<=0){
        alert("Enter a valid bill amount");
        return;
    }

    if(isNaN(people) || people<=0){
        alert("Enter valid number of people");
        return;
    }

    let tipAmount =
        bill * tipPercent / 100;

    let totalBill =
        bill + tipAmount;

    let tipPerPerson =
        tipAmount / people;

    let totalPerPerson =
        totalBill / people;

    document.getElementById("tipPerPerson").innerHTML =
        "₹" + tipPerPerson.toFixed(2);

    document.getElementById("totalPerPerson").innerHTML =
        "₹" + totalPerPerson.toFixed(2);

    document.getElementById("results").style.display =
        "block";
}

</script>

</body>
</html>
